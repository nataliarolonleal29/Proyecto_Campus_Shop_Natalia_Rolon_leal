<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Shop - Producto</title>
</head>
<body>
    <main class="main-content">
        <header class="header-principal">
            <div class="flecha-logo">⬅️</div>
            <h1>Detalles del Producto</h1>
            <div class="carrito-logo">🛒</div>
        </header>

        <div style="text-align: center; margin-top: 20px;">
            <img src="images/abrigo1.png" alt="abrigo" style="width: 100%; border-radius: 20px; background: #eee;">
        </div>

        <h2 style="margin-top: 20px;">Abrigo Gris para mujer</h2>
        <p class="precio-antes-producto">$200.000 COP</p>
        <p style="font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">$100.000 COP</p>

        <p style="color: var(--text-muted); margin: 15px 0;">Abrigo ideal para días laborales, eventos especiales y/o días casuales. Tela delicada, lavar a mano o en ciclo delicado en lavadora. Oferta disponible hasta el 30 de Abril.</p>

        <div style="margin-bottom: 20px;">
            <p><strong>Talla</strong></p>
            <button style="padding: 10px 15px; border-radius: 5px; border: 1px solid #ccc;">S</button>
            <button style="padding: 10px 15px; border-radius: 5px; border: 2px solid var(--primary-color); background: var(--primary-light);">M</button>
            <button style="padding: 10px 15px; border-radius: 5px; border: 1px solid #ccc;">L</button>
        </div>

        <button class="btn-kart">Agregar al carrito</button>

    </main>
</body>
</html>
